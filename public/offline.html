<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión - GlobalScore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ================================================================
       TOKENS — espejo exacto de Auth.css
    ================================================================ */
    :root {
      --auth-cream:   #f0ede8;
      --auth-surface: #e8e4de;
      --auth-border:  #d4cfc8;
      --auth-dark:    #1e202c;
      --auth-accent:  #5b4fd8;
      --auth-red:     #ef4444;
      --auth-muted:   #b0aaa0;
      --auth-mono:    'DM Mono', monospace;
      --auth-sans:    'Sora', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --auth-cream:   #f0ede8;
        --auth-surface: #e8e4de;
        --auth-border:  #d4cfc8;
        --auth-dark:    #1e202c;
        --auth-muted:   #b0aaa0;
      }
    }

    /* ================================================================
       RESET
    ================================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ================================================================
       PÁGINA — replica de .welcome-screen
    ================================================================ */
    body {
      position: fixed;
      inset: 0;
      background: var(--auth-cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      font-family: var(--auth-sans);
      padding: 52px 36px 52px;
      overflow: hidden;
      animation: wsFadeIn 0.4s ease both;
    }

    @keyframes wsFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Cuadrícula de fondo — igual que auth-wrapper::before */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg,  transparent, transparent 39px, rgba(212,207,200,0.4) 39px, rgba(212,207,200,0.4) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(212,207,200,0.4) 39px, rgba(212,207,200,0.4) 40px);
      pointer-events: none;
      z-index: 0;
    }

    /* Esquina decorativa superior derecha */
    body::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 180px 180px 0;
      border-color: transparent rgba(91,79,216,0.06) transparent transparent;
      pointer-events: none;
      z-index: 0;
    }

    /* ================================================================
       DOTS ROW — igual que .welcome-dots-row
    ================================================================ */
    .dots-row {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dots-row span {
      display: block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--auth-border);
    }

    /* El dot central es el acento, pero aquí en rojo por "offline" */
    .dots-row span:nth-child(3) {
      width: 7px; height: 7px;
      background: var(--auth-red);
      animation: dotBlink 2s ease-in-out infinite;
    }

    @keyframes dotBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ================================================================
       HERO — replica de .welcome-hero
    ================================================================ */
    .hero {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
    }

    /* Marco brutalista — igual que .welcome-icon-bg */
    .icon-frame {
      position: relative;
      width: 180px; height: 180px;
      border: 1.5px solid var(--auth-dark);
      background: var(--auth-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: iconFloat 4s ease-in-out infinite;
      box-shadow: 4px 4px 0 var(--auth-dark);
    }

    /* Borde offset exterior — igual que .welcome-icon-bg::before */
    .icon-frame::before {
      content: '';
      position: absolute;
      top: -8px; left: -8px; right: 8px; bottom: 8px;
      border: 0.5px solid rgba(91,79,216,0.2);
      pointer-events: none;
    }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    /* Bloque negro interior — igual que .welcome-icon-inner */
    .icon-inner {
      width: 90px; height: 90px;
      background: var(--auth-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Cuadrado giratorio rojo (en welcome era accent, aquí red para offline) */
    .icon-inner::before {
      content: '';
      width: 36px; height: 36px;
      border: 3px solid var(--auth-red);
      display: block;
      animation: rotateSq 3s linear infinite;
      opacity: 0.85;
    }

    @keyframes rotateSq {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Cuadrado blanco central estático */
    .icon-inner::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      background: #fff;
    }

    /* Líneas de señal — 4 barras como antena cortada */
    .signal-bars {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: flex-end;
      gap: 4px;
    }

    .signal-bars span {
      display: block;
      width: 5px;
      background: var(--auth-border);
      border-radius: 1px;
    }

    .signal-bars span:nth-child(1) { height: 6px; }
    .signal-bars span:nth-child(2) { height: 10px; }
    .signal-bars span:nth-child(3) { height: 14px; background: var(--auth-red); opacity: 0.35; }
    .signal-bars span:nth-child(4) { height: 18px; background: var(--auth-red); opacity: 0.15; }

    /* ================================================================
       PARTÍCULAS — igual que .welcome-particle
    ================================================================ */
    .particle {
      position: absolute;
      background: var(--auth-accent);
      opacity: 0.15;
      animation: particleDrift 5s ease-in-out infinite;
    }

    .p1 { width: 14px; height: 14px; top: 15%; right: 20%; animation-delay: 0s; }
    .p2 { width: 8px;  height: 8px;  bottom: 20%; left: 18%; animation-delay: 1.5s; }
    .p3 { width: 6px;  height: 6px;  top: 30%; left: 12%; opacity: 0.1; animation-delay: 0.8s; }

    @keyframes particleDrift {
      0%, 100% { transform: translate(0,    0)   rotate(0deg);   }
      33%       { transform: translate(6px,  -8px) rotate(90deg);  }
      66%       { transform: translate(-4px, 5px)  rotate(180deg); }
    }

    /* ================================================================
       BODY TEXT — replica de .welcome-body
    ================================================================ */
    .body-text {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    /* Igual que .welcome-title */
    .title {
      margin: 0 0 10px 0;
      font-size: 28px;
      font-weight: 800;
      color: #1a1a2e;
      letter-spacing: -0.06em;
      line-height: 1.1;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    /* Igual que .welcome-subtitle */
    .subtitle {
      margin: 0 0 10px 0;
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.7;
      font-family: var(--auth-mono);
      max-width: 280px;
      animation: fadeUp 0.5s ease 0.2s both;
      letter-spacing: 0.02em;
    }

    /* Badge de estado — offline */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0 0 28px 0;
      padding: 5px 12px;
      border: 0.5px solid rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.06);
      animation: fadeUp 0.5s ease 0.25s both;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--auth-red);
      animation: dotBlink 2s ease-in-out infinite;
    }

    .status-text {
      font-family: var(--auth-mono);
      font-size: 9px;
      font-weight: 700;
      color: var(--auth-red);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ================================================================
       BOTONES — réplica exacta de .welcome-enter-btn
    ================================================================ */
    .btn-primary {
      width: 100%;
      max-width: 280px;
      padding: 16px 24px;
      border: none;
      background: #1e202c;
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      font-family: var(--auth-mono);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 3px 3px 0 rgba(91,79,216,0.3);
      animation: fadeUp 0.5s ease 0.3s both;
      position: relative;
      margin-bottom: 10px;
    }

    .btn-primary:hover {
      background: var(--auth-accent);
      box-shadow: 3px 3px 0 #1e202c;
    }

    .btn-primary:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 rgba(91,79,216,0.3);
    }

    /* Botón secundario — borde fino */
    .btn-secondary {
      width: 100%;
      max-width: 280px;
      padding: 13px 24px;
      border: 0.5px solid var(--auth-border);
      background: transparent;
      color: var(--auth-muted);
      font-size: 11px;
      font-weight: 700;
      font-family: var(--auth-mono);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      animation: fadeUp 0.5s ease 0.38s both;
    }

    .btn-secondary:hover {
      border-color: var(--auth-accent);
      color: var(--auth-accent);
    }

    .btn-secondary:active {
      transform: translate(1px, 1px);
    }

    /* ================================================================
       TOAST — igual que el original pero con tipografía mono
    ================================================================ */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-140%);
      background: #1e202c;
      color: #fff;
      padding: 14px 24px;
      border: 0.5px solid rgba(91,79,216,0.3);
      box-shadow: 3px 3px 0 rgba(91,79,216,0.3);
      font-family: var(--auth-mono);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 10000;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: calc(100vw - 40px);
      white-space: nowrap;
    }

    .toast::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #34d399;
      flex-shrink: 0;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ================================================================
       ANIMACIONES
    ================================================================ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ================================================================
       RESPONSIVE
    ================================================================ */
    @media (max-width: 380px) {
      body { padding: 44px 28px 44px; }

      .icon-frame { width: 160px; height: 160px; }
      .icon-inner { width: 80px; height: 80px; }

      .title { font-size: 24px; }
    }

    @media (min-width: 641px) {
      body {
        align-items: center;
        justify-content: center;
        gap: 0;
      }

      .dots-row { display: none; }

      body > .hero {
        flex: unset;
        height: 240px;
      }
    }

    /* Reducir movimiento */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>

  <!-- Dots nav — igual que welcome screen -->
  <div class="dots-row">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- Hero con el ícono animado -->
  <div class="hero">
    <div class="icon-frame">
      <div class="icon-inner"></div>

      <!-- Barras de señal cortada -->
      <div class="signal-bars">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- Partículas flotantes -->
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
  </div>

  <!-- Texto y botones -->
  <div class="body-text">

    <h1 class="title">Sin conexión</h1>

    <p class="subtitle">
      No hay red disponible.<br />
      Verifica tu conexión e intenta de nuevo.
    </p>

    <!-- Badge de estado -->
    <div class="status-badge">
      <span class="status-dot"></span>
      <span class="status-text">Globalscore · offline</span>
    </div>

    <button class="btn-primary" onclick="handleRetry(this)">
      Reintentar
    </button>

    <button class="btn-secondary" onclick="goHome()">
      Ir al inicio
    </button>

  </div>

  <!-- Toast de reconexión -->
  <div class="toast" id="toast">Conexión restaurada — recargando</div>

  <script>
    // ── Reintentar con feedback visual ──────────────────────────────
    function handleRetry(btn) {
      const original = btn.textContent;
      btn.textContent = '···';
      btn.disabled = true;
      setTimeout(() => {
        if (navigator.onLine) {
          location.reload();
        } else {
          btn.textContent = original;
          btn.disabled = false;
        }
      }, 800);
    }

    // ── Ir al inicio ─────────────────────────────────────────────────
    function goHome() {
      window.location.href = '/';
    }

    // ── Detectar reconexión ──────────────────────────────────────────
    window.addEventListener('online', () => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => location.reload(), 1500);
    });

    // ── Auto-retry cada 10 s (máx. 6 veces) ─────────────────────────
    let retries = 0;
    const timer = setInterval(() => {
      if (navigator.onLine) { clearInterval(timer); location.reload(); }
      if (++retries >= 6) clearInterval(timer);
    }, 10000);

    // ── Recargar si la página vuelve a ser visible y hay red ─────────
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && navigator.onLine) location.reload();
    });
  </script>
</body>
</html>
